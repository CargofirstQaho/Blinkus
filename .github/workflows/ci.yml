name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save free-tier minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (install + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # No test suite in Backend yet — verify every source file parses.
      - name: Syntax-check all source files
        run: |
          find . -name '*.js' -not -path './node_modules/*' -print0 \
            | xargs -0 -n1 -P4 node --check
          echo "All Backend source files parsed successfully."

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --runInBand
        env:
          CI: true

      - name: Build
        run: npm run build

  notify:
    name: Notify chat
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compute status
        id: status
        run: |
          if [ "${{ needs.backend.result }}" = "success" ] && [ "${{ needs.frontend.result }}" = "success" ]; then
            echo "emoji=✅"       >> "$GITHUB_OUTPUT"
            echo "text=passed"    >> "$GITHUB_OUTPUT"
          else
            echo "emoji=❌"       >> "$GITHUB_OUTPUT"
            echo "text=failed"    >> "$GITHUB_OUTPUT"
          fi

      # Discord: add repo secret DISCORD_WEBHOOK (Server Settings → Integrations → Webhooks).
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set — skipping."
            exit 0
          fi
          MSG="${{ steps.status.outputs.emoji }} CI ${{ steps.status.outputs.text }} on \`${{ github.ref_name }}\` — ${{ github.event_name }} by ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "$DISCORD_WEBHOOK" || echo "Discord notify failed (non-fatal)."

      # Telegram alternative: add secrets TELEGRAM_TOKEN and TELEGRAM_CHAT_ID.
      - name: Notify Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping."
            exit 0
          fi
          MSG="${{ steps.status.outputs.emoji }} CI ${{ steps.status.outputs.text }} on ${{ github.ref_name }} (${{ github.event_name }} by ${{ github.actor }})"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG" \
            -d disable_web_page_preview=true || echo "Telegram notify failed (non-fatal)."
